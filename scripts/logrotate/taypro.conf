# Taypro cron + app logs (install: npm run ops:install-logrotate)
# Paths must exist or logrotate skips (missingok).

/var/log/blog-automation.log
/var/www/taypro-dashboard/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su ubuntu ubuntu
}

/var/log/pm2/taypro-dashboard.log
/var/log/pm2/taypro-dashboard-error.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su ubuntu ubuntu
}
