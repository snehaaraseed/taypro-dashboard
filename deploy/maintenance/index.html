<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Taypro — Scheduled maintenance</title>
    <style>
      :root {
        --primary: #052638;
        --accent: #6ce7fd;
        --text: #e8f4f8;
        --muted: #9bb8c7;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--primary);
        color: var(--text);
        line-height: 1.6;
      }
      main {
        max-width: 32rem;
        text-align: center;
      }
      .logo {
        width: 3.5rem;
        height: 3.5rem;
        margin: 0 auto 1.5rem;
        border-radius: 0.5rem;
        background: linear-gradient(135deg, #0b3955, #6ce7fd33);
        border: 1px solid rgba(108, 231, 253, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--accent);
        letter-spacing: -0.04em;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        color: var(--muted);
        margin-bottom: 1.25rem;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        background: rgba(108, 231, 253, 0.12);
        color: var(--accent);
        font-size: 0.875rem;
        font-weight: 500;
      }
      .dots span {
        display: inline-block;
        width: 0.35rem;
        height: 0.35rem;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.35;
        }
        40% {
          opacity: 1;
        }
      }
      footer {
        margin-top: 2rem;
        font-size: 0.8125rem;
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">T</div>
      <h1>We&rsquo;ll be right back</h1>
      <p>
        Taypro is undergoing a scheduled update. This is temporary&mdash;we&rsquo;re
        improving the site and will be online again shortly.
      </p>
      <p class="status" aria-live="polite">
        <span class="dots" aria-hidden="true"
          ><span></span><span></span><span></span
        ></span>
        Maintenance in progress
      </p>
      <footer>
        Questions? <a href="mailto:sales@taypro.in">sales@taypro.in</a>
      </footer>
    </main>
  </body>
</html>
