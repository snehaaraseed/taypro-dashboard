# HTML only — microcache + connection cap (static assets bypass this).
limit_conn taypro_origin_conns 40;
include /var/www/taypro-dashboard/deploy/nginx/proxy-cache-location.conf;
include /var/www/taypro-dashboard/deploy/nginx/maintenance-location.conf;
include /var/www/taypro-dashboard/deploy/nginx/security-headers.conf;
proxy_pass http://taypro_nextjs;
# Next.js sets Vary: rsc, next-router-* which prevents Cloudflare HTML edge cache.
# Static/ISR marketing pages are visitor-agnostic; narrow Vary to encoding only.
proxy_hide_header Vary;
proxy_hide_header x-middleware-rewrite;
proxy_hide_header x-visitor-country;
proxy_hide_header x-pathname;
proxy_hide_header x-logical-pathname;
add_header Vary "Accept-Encoding" always;
add_header Cache-Control "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400" always;
add_header CDN-Cache-Control "public, max-age=3600" always;
