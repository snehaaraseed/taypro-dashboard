# HTML only — microcache + connection cap (static assets bypass this).
limit_conn taypro_origin_conns 40;
include /var/www/taypro-dashboard/deploy/nginx/proxy-cache-location.conf;
include /var/www/taypro-dashboard/deploy/nginx/maintenance-location.conf;
proxy_pass http://taypro_nextjs;
add_header Cache-Control "public, s-maxage=3600, stale-while-revalidate=86400" always;
