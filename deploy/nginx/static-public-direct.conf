# Serve heavy public assets from disk (never hit Node during crawls).
# Included inside the HTTPS server {} block before regex static locations.

location /360-degree-images/ {
    alias /var/www/taypro-dashboard/public/360-degree-images/;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location /tayproasset/ {
    alias /var/www/taypro-dashboard/public/tayproasset/;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

