# Taypro deployment maintenance (503 + Retry-After for crawlers).
# Enabled when /var/www/taypro-dashboard/.maintenance exists.
# Managed by scripts/maintenance-mode.sh and deploy.sh

# Two-step if: more reliable than a single if (-f) with return in some nginx builds.
set $taypro_maintenance 0;
if (-f /var/www/taypro-dashboard/.maintenance) {
    set $taypro_maintenance 1;
}
if ($taypro_maintenance = 1) {
    return 503;
}

error_page 503 @taypro_maintenance;

location @taypro_maintenance {
    internal;
    root /var/www/taypro-dashboard/deploy/maintenance;
    try_files /index.html =503;
    default_type text/html;
    add_header Retry-After 900 always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
}
