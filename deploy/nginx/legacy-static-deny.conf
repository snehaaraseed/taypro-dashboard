# Legacy WordPress / static HTML — deny direct nginx serving (SEO-045).
# Include inside the taypro.in server {} block BEFORE any try_files that
# serves files from disk. Ensures requests reach Next.js redirects in next.config.ts.
#
# On the host, also delete if present:
#   /var/www/.../taypro-basic/
#   /var/www/.../industrial_solar_panel_cleaning_system.html
#   /var/www/.../news/

location = /taypro-basic {
    return 301 /solar-panel-cleaning-system/semi-automatic-solar-panel-cleaning-system;
}

location = /taypro-basic/ {
    return 301 /solar-panel-cleaning-system/semi-automatic-solar-panel-cleaning-system;
}

location = /industrial_solar_panel_cleaning_system.html {
    return 301 /solar-panel-cleaning-system;
}

location = /industrial_solar_panel_cleaning_system {
    return 301 /solar-panel-cleaning-system;
}

location ^~ /news/ {
    rewrite ^/news/(.*)$ /blog/$1 permanent;
}

location = /contact/ {
    return 301 /contact;
}
