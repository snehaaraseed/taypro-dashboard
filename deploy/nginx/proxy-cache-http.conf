# Origin HTML microcache + connection cap (survives crawl bursts).
# Included from http {} via conf.d on the server.

proxy_cache_path /var/cache/nginx/taypro
    levels=1:2
    keys_zone=TAYPRO_HTML:80m
    max_size=1g
    inactive=60m
    use_temp_path=off;

# Cap total concurrent origin fetches for taypro.in (all locations share server_name key).
limit_conn_zone $server_name zone=taypro_origin_conns:1m;
